<script>
  let currentStep = 1;
  const totalSteps = 4;
  const form = document.getElementById('wizardForm');
  const loadingOverlay = document.getElementById('loadingOverlay');

  function byId(id) {
    return document.getElementById(id);
  }

  function setText(id, value) {
    const el = byId(id);
    if (el) el.textContent = value;
  }

  function getValue(id, fallback = '') {
    return byId(id)?.value ?? fallback;
  }

  function getCheckedValue(name, fallback = '') {
    return document.querySelector(`input[name="${name}"]:checked`)?.value ?? fallback;
  }

  function buildAddress(prefix) {
    return `${getValue(`alamat${prefix}`)} RT.${getValue(`rt${prefix}`)} RW.${getValue(`rw${prefix}`)} Kel.${getValue(`kelDesa${prefix}`)} Kec.${getValue(`kec${prefix}`)}`.trim();
  }

  // --- SMART FEATURES: AUTO-FORMATTING ---
  function formatName(el) {
    el.value = el.value.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    updateLiveSummary();
  }

  function formatPhone(el) {
    if (el.value.startsWith('8')) el.value = '08' + el.value.slice(1);
    updateLiveSummary();
  }

  function validateNIK(el) {
    const error = byId('nik-error');
    if (el.value.length !== 16) {
      el.classList.add('border-yellow-300');
      if (error) error.classList.remove('hidden');
    } else {
      el.classList.remove('border-yellow-300');
      if (error) error.classList.add('hidden');
    }
    updateLiveSummary();
  }

  function detectAge(el) {
    if (!el.value) return;
    const dob = new Date(el.value);
    const diff = Date.now() - dob.getTime();
    const age = new Date(diff).getUTCFullYear() - 1970;

    const badge = byId('age-badge');
    if (!badge) return;
    let gen = "";
    const year = dob.getFullYear();
    if (year >= 1997 && year <= 2012) gen = "Gen Z";
    else if (year >= 1981 && year <= 1996) gen = "Millennial";
    else if (year >= 1965 && year <= 1980) gen = "Gen X";

    badge.textContent = `${age} Thn | ${gen}`;
    badge.classList.remove('hidden');
    updateLiveSummary();
  }

  // --- SMART FEATURES: AUTO-FILL ADDRESS ---
  async function autoFillAddress(el, type) {
    if (el.value.length === 5) {
      const loading = byId(`pos-loading-${type}`);
      if (loading) loading.classList.remove('hidden');
      try {
        setTimeout(() => {
          if (el.value === "70611") {
            byId(`kelDesa${type}`).value = "Jawa";
            byId(`kec${type}`).value = "Martapura";
          } else if (el.value === "70619") {
            byId(`kelDesa${type}`).value = "Indrasari";
            byId(`kec${type}`).value = "Martapura";
          }
          if (loading) loading.classList.add('hidden');
          updateLiveSummary();
        }, 800);
      } catch (e) {
        if (loading) loading.classList.add('hidden');
      }
    }
  }

  function copyAddress(cb) {
    if (cb.checked) {
      ['alamat', 'rt', 'rw', 'kelDesa', 'kec'].forEach(f => {
        const target = byId(`${f}Tinggal`);
        const source = byId(`${f}KTP`);
        if (target && source) target.value = source.value;
      });
    }
    updateLiveSummary();
  }

  // --- UI LOGIC: NAVIGATION ---
  function showStep(step) {
    document.querySelectorAll('.step-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(`step-${step}`).classList.remove('hidden');

    document.getElementById('prevBtn').classList.toggle('hidden', step === 1);
    document.getElementById('nextBtn').classList.toggle('hidden', step === totalSteps);
    document.getElementById('submitBtn').classList.toggle('hidden', step !== totalSteps);

    updateStepUI(step);
    saveToDraft();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updateStepUI(step) {
    document.querySelectorAll('.step-dot').forEach((dot, idx) => {
      const s = idx + 1;
      dot.classList.toggle('active', s === step);
      dot.classList.toggle('completed', s < step);
      dot.classList.toggle('bg-slate-100', s > step);
    });
    const bar = document.getElementById('progress-bar');
    bar.style.width = `${((step - 1) / (totalSteps - 1)) * 100}%`;
  }

  function goToStep(step) {
    if (step < currentStep) {
      currentStep = step;
      showStep(currentStep);
    }
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    const inputs = document.getElementById(`step-${currentStep}`).querySelectorAll('[required], input[type="text"], input[type="number"]');
    let isValid = true;
    if (currentStep === 1) {
      if (document.getElementById('namaLengkap').value.length < 3) isValid = false;
      if (document.getElementById('nik').value.length !== 16) isValid = false;
    }

    if (isValid && currentStep < totalSteps) {
      currentStep++;
      showStep(currentStep);
    } else {
      alert("Mohon lengkapi data dengan benar.");
    }
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (currentStep > 1) {
      currentStep--;
      showStep(currentStep);
    }
  });

  // --- LIVE SUMMARY & CHECKOUT ---
  function updateCheckout() {
    const pokokCustom = byId('pokokLain');
    const wajibCustom = byId('wajibLain');
    const pokokChecked = document.querySelector('input[name="simpananPokok"]:checked');
    const wajibChecked = document.querySelector('input[name="simpananWajib"]:checked');
    const pokok = pokokCustom?.value || pokokChecked?.value || '0';
    const wajib = wajibCustom?.value || wajibChecked?.value || '0';

    const total = parseInt(pokok) + parseInt(wajib);

    setText('check-pokok', `Rp ${parseInt(pokok).toLocaleString()}`);
    setText('check-wajib', `Rp ${parseInt(wajib).toLocaleString()}`);
    setText('check-total', `Rp ${total.toLocaleString()}`);

    updateLiveSummary();
  }

  function updateLiveSummary() {
    const nama = byId('namaLengkap')?.value || '';
    const summaryEmpty = byId('summary-empty');
    const summaryContent = byId('summary-content');

    if (!summaryEmpty || !summaryContent) return;

    if (nama.length > 2) {
      summaryEmpty.classList.add('hidden');
      summaryContent.classList.remove('hidden');

      setText('sum-nama', nama);
      setText('sum-nik', `NIK: ${byId('nik')?.value || '---'}`);
      setText('sum-age', byId('age-badge')?.textContent || '');

      const alamat = byId('alamatTinggal')?.value || '';
      if (alamat) {
        byId('sum-alamat-box')?.classList.remove('hidden');
        setText(
          'sum-alamat',
          `${alamat}, RT.${byId('rtTinggal')?.value || '-'}/${byId('rwTinggal')?.value || '-'}, ${byId('kelDesaTinggal')?.value || ''}`
        );
      }
    } else {
      summaryEmpty.classList.remove('hidden');
      summaryContent.classList.add('hidden');
    }
  }

  // --- DATA PERSISTENCE: DRAFT ---
  function saveToDraft() {
    const data = {};
    document.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.type === 'radio') {
        if (el.checked) data[`radio:${el.name}`] = el.value;
        return;
      }
      if (el.type === 'checkbox') {
        if (el.id) data[`checkbox:${el.id}`] = el.checked;
        return;
      }
      if (el.id) data[el.id] = el.value;
    });
    localStorage.setItem('kks_form_draft', JSON.stringify(data));
  }

  function loadDraft() {
    const draft = localStorage.getItem('kks_form_draft');
    if (draft) {
      const data = JSON.parse(draft);
      for (const key in data) {
        if (key.startsWith('radio:')) {
          const name = key.replace('radio:', '');
          const radio = document.querySelector(`input[name="${name}"][value="${data[key]}"]`);
          if (radio) radio.checked = true;
          continue;
        }
        if (key.startsWith('checkbox:')) {
          const checkbox = byId(key.replace('checkbox:', ''));
          if (checkbox) checkbox.checked = Boolean(data[key]);
          continue;
        }
        const el = byId(key);
        if (el) el.value = data[key];
      }
      updateCheckout();
      const birthDate = byId('tanggalLahir');
      if (birthDate) detectAge(birthDate);
    }
  }

  // --- FINAL SUBMISSION ---
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    loadingOverlay.classList.remove('hidden');

    const formData = {
      tanggalBergabung: new Date().toISOString().split('T')[0],
      namaAnggota: getValue('namaLengkap'),
      nik: getValue('nik'),
      tempatLahir: getValue('tempatLahir'),
      tanggalLahir: getValue('tanggalLahir'),
      jenisKelamin: getCheckedValue('jenisKelamin', 'Laki-Laki'),
      telponAnggota: "'" + getValue('telpon'),
      email: getValue('email'),
      alamatKTP: buildAddress('KTP'),
      alamatTinggal: buildAddress('Tinggal'),
      keluargaSerumah: getValue('keluargaSerumah'),
      hubunganKeluargaSerumah: getValue('hubunganKeluargaSerumah'),
      telponKeluargaSerumah: "'" + getValue('telponKeluargaSerumah'),
      keluargaTidakSerumah: getValue('keluargaTidakSerumah'),
      telponKeluargaTidakSerumah: "'" + getValue('telponKeluargaTidakSerumah'),
      jenisPekerjaan: getValue('jenisPekerjaan'),
      kantorPekerjaan: getValue('kantorPekerjaan'),
      alamatKantor: getValue('alamatKantor'),
      namaBank: getValue('namaBank'),
      noRekBank: getValue('noRekBank'),
      anBank: getValue('anBank'),
      simpananPokok: getValue('pokokLain') || getCheckedValue('simpananPokok'),
      simpananWajib: getValue('wajibLain') || getCheckedValue('simpananWajib'),
      akunPembayaran: getCheckedValue('akunPembayaran')
    };

    google.script.run
      .withSuccessHandler((res) => {
        localStorage.removeItem('kks_form_draft');
        const message = res?.message || 'Data pendaftaran berhasil dikirim.';
        loadingOverlay.innerHTML = `
          <div class="text-green-500 text-6xl mb-6">✓</div>
          <h2 class="text-2xl font-extrabold text-slate-800 mb-2">Pendaftaran Terkirim!</h2>
          <p class="text-slate-400 mb-8 max-w-xs mx-auto">${message}</p>
          <button onclick="google.script.host.close()" class="px-12 py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-black transition-all">Selesai</button>
        `;
      })
      .withFailureHandler((err) => {
        loadingOverlay.classList.add('hidden');
        const message = err?.message || 'Terjadi kesalahan saat mengirim pendaftaran.';
        alert(message);
      })
      .newTransaction({
      method: 'addPending',
      sheet: 'simpanan',
      data: formData
    });
  });

  // INIT
  loadDraft();
  updateCheckout();
</script>
