<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendaftaran Anggota Modern - KKS Arrahmah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style type="text/tailwindcss">
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 25%, #ecfdf5 50%, #f5f3ff 75%, #fefce8 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 
        0 8px 32px rgba(31, 38, 135, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .step-dot {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .step-dot.active {
      background-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
      transform: scale(1.1);
    }

    .step-dot.completed {
      background-color: #22c55e;
    }

    .step-dot.completed::after {
      content: '✓';
      color: white;
      font-size: 0.75rem;
    }

    /* Sembunyikan spinner bawaan browser di semua input number */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }

    /* Rapikan tampilan date input */
    input[type=date]::-webkit-calendar-picker-indicator {
      opacity: 0.5;
      cursor: pointer;
    }
    input[type=date] {
      color-scheme: light;
    }

    .input-field {
      @apply w-full px-4 py-3 rounded-2xl outline-none transition-all duration-300 text-sm;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 
        inset 0 2px 4px rgba(0, 0, 0, 0.02),
        0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .input-field:focus {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(34, 197, 94, 0.4);
      box-shadow: 
        0 0 0 3px rgba(34, 197, 94, 0.1),
        inset 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    .input-field:hover {
      background: rgba(255, 255, 255, 0.7);
    }

    .label-text {
      @apply text-[10px] font-bold text-gray-400 uppercase tracking-wider ml-1 mb-1 block;
    }

    /* Compact Mobile (320px - 375px) */
    @media (max-width: 375px) {
      .step-label {
        display: none;
      }

      .glass-card {
        border-radius: 1.5rem;
        padding: 1.25rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .input-field {
        padding: 0.625rem 0.875rem;
        font-size: 0.875rem;
      }
    }

    /* Mobile (376px - 639px) */
    @media (min-width: 376px) and (max-width: 639px) {
      .step-label {
        display: none;
      }

      .glass-card {
        border-radius: 2rem;
        padding: 1.5rem;
      }

      h1 {
        font-size: 1.75rem;
      }
    }

    /* Tablet/Small Desktop (640px - 1023px) */
    @media (min-width: 640px) and (max-width: 1023px) {
      .glass-card {
        border-radius: 2.5rem;
        padding: 2rem;
      }
    }

    /* Floating summary for desktop */
    @media (min-width: 1024px) {
      .summary-card {
        position: sticky;
        top: 2rem;
      }
    }

    .checkout-row {
      @apply flex justify-between py-2 border-b border-gray-50 last:border-0;
    }
  </style>
</head>

<body class="min-h-screen flex items-start sm:items-center justify-center py-4 sm:py-6 md:py-10 px-3 sm:px-4">

  <div class="w-full max-w-4xl px-0 sm:px-4">

    <!-- Main Form -->
    <div class="space-y-6">
      <div class="glass-card sm:rounded-[2.5rem] p-6 sm:p-10 transition-all">
        <!-- Header -->
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Bergabung Bersama Kami</h1>
          <p class="text-slate-400 text-sm mt-1">KKS Arrahmah - Cabang Martapura</p>
        </div>

        <!-- Progress Tracker -->
        <div class="relative flex justify-between mb-10 max-w-md mx-auto">
          <div class="absolute top-1/2 left-0 w-full h-[2px] bg-slate-100 -translate-y-1/2 z-0"></div>
          <div id="progress-bar"
            class="absolute top-1/2 left-0 w-0 h-[2px] bg-green-500 -translate-y-1/2 z-0 transition-all duration-500">
          </div>

          <div class="relative z-10 flex flex-col items-center group" onclick="goToStep(1)">
            <div id="dot-1"
              class="step-dot active w-7 h-7 rounded-full flex items-center justify-center bg-white border-2 border-slate-100">
            </div>
            <span class="step-label text-[10px] font-bold mt-2 text-slate-400 uppercase">Profil</span>
          </div>
          <div class="relative z-10 flex flex-col items-center group" onclick="goToStep(2)">
            <div id="dot-2"
              class="step-dot w-7 h-7 rounded-full flex items-center justify-center bg-white border-2 border-slate-100">
            </div>
            <span class="step-label text-[10px] font-bold mt-2 text-slate-400 uppercase">Alamat</span>
          </div>
          <div class="relative z-10 flex flex-col items-center group" onclick="goToStep(3)">
            <div id="dot-3"
              class="step-dot w-7 h-7 rounded-full flex items-center justify-center bg-white border-2 border-slate-100">
            </div>
            <span class="step-label text-[10px] font-bold mt-2 text-slate-400 uppercase">Pekerjaan</span>
          </div>
          <div class="relative z-10 flex flex-col items-center group" onclick="goToStep(4)">
            <div id="dot-4"
              class="step-dot w-7 h-7 rounded-full flex items-center justify-center bg-white border-2 border-slate-100">
            </div>
            <span class="step-label text-[10px] font-bold mt-2 text-slate-400 uppercase">Simpanan</span>
          </div>
        </div>

        <form id="wizardForm" class="space-y-6">
          <!-- Step 1: Profil -->
          <div id="step-1" class="step-content space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="label-text">Nama Lengkap</label>
                <input type="text" id="namaLengkap" placeholder="Budi Santoso" class="input-field"
                  oninput="formatName(this)">
              </div>
              <div>
                <label class="label-text">NIK (16 Digit)</label>
                <input type="text" inputmode="numeric" maxlength="16" id="nik" placeholder="630XXXXXXXXXXXXX" class="input-field"
                  oninput="validateNIK(this)">
                <span id="nik-error" class="text-[9px] text-red-500 hidden font-bold">NIK harus 16 digit</span>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="label-text">Tgl Lahir</label>
                  <input type="date" id="tanggalLahir" class="input-field" onchange="detectAge(this)">
                </div>
                <div class="flex flex-col justify-end pb-2">
                  <span id="age-badge"
                    class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg w-fit hidden"></span>
                </div>
              </div>
              <div>
                <label class="label-text">Tempat Lahir</label>
                <input type="text" id="tempatLahir" placeholder="Martapura" class="input-field">
              </div>
              <div>
                <label class="label-text">Jenis Kelamin</label>
                <div class="flex gap-4 mt-2 px-2">
                  <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                    <input type="radio" name="jenisKelamin" value="Laki-Laki" checked> Laki-Laki
                  </label>
                  <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                    <input type="radio" name="jenisKelamin" value="Perempuan"> Perempuan
                  </label>
                </div>
              </div>
              <div>
                <label class="label-text">Whatsapp</label>
                <input type="text" inputmode="numeric" maxlength="14" id="telpon" placeholder="08XXXXXXXXXX" class="input-field"
                  oninput="formatPhone(this)">
              </div>
              <div class="sm:col-span-2">
                <label class="label-text">Email Pribadi</label>
                <input type="email" id="email" placeholder="nama@email.com" class="input-field">
              </div>
            </div>
          </div>

          <!-- Step 2: Alamat -->
          <div id="step-2" class="step-content hidden space-y-6">
            <div class="p-4 bg-slate-50/50 rounded-3xl space-y-3">
              <div class="flex justify-between items-center px-1">
                <label class="label-text !mb-0">Alamat KTP</label>
                <div class="flex items-center gap-2">
                  <input type="number" id="kodePosKTP" placeholder="Kode Pos"
                    class="w-24 px-3 py-1 rounded-full border text-xs text-center outline-none focus:border-green-500"
                    oninput="autoFillAddress(this, 'KTP')">
                  <span id="pos-loading-KTP"
                    class="text-[9px] text-green-500 hidden animate-pulse font-bold tracking-widest">MENCARI...</span>
                </div>
              </div>
              <input type="text" id="alamatKTP" placeholder="Jalan / Perumahan / No Rumah" class="input-field">
              <div class="grid grid-cols-2 gap-3">
                <input type="text" inputmode="numeric" maxlength="3" id="rtKTP" placeholder="RT" class="input-field text-center">
                <input type="text" inputmode="numeric" maxlength="3" id="rwKTP" placeholder="RW" class="input-field text-center">
                <input type="text" id="kelDesaKTP" placeholder="Kelurahan" class="input-field">
                <input type="text" id="kecKTP" placeholder="Kecamatan" class="input-field">
              </div>
            </div>

            <div class="p-4 bg-green-50/20 rounded-3xl border border-green-50 space-y-3">
              <div class="flex justify-between items-center px-1">
                <label class="label-text !mb-0 text-green-600">Alamat Domisili</label>
                <label class="flex items-center gap-1 cursor-pointer text-[9px] font-bold text-green-500 uppercase">
                  <input type="checkbox" id="samaKTP" class="w-3 h-3 rounded text-green-500"
                    onchange="copyAddress(this)"> SAMA KTP
                </label>
              </div>
              <input type="text" id="alamatTinggal" placeholder="Jalan / Perumahan / No Rumah" class="input-field">
              <div class="grid grid-cols-2 gap-3">
                <input type="text" inputmode="numeric" maxlength="3" id="rtTinggal" placeholder="RT" class="input-field text-center">
                <input type="text" inputmode="numeric" maxlength="3" id="rwTinggal" placeholder="RW" class="input-field text-center">
                <input type="text" id="kelDesaTinggal" placeholder="Kelurahan" class="input-field">
                <input type="text" id="kecTinggal" placeholder="Kecamatan" class="input-field">
              </div>
            </div>
          </div>

          <!-- Step 3: Pekerjaan -->
          <div id="step-3" class="step-content hidden space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="label-text">Jenis Pekerjaan</label>
                <select id="jenisPekerjaan" class="input-field">
                  <option value="">Pilih Pekerjaan</option>
                  <option value="ASN">ASN / Pegawai Negeri</option>
                  <option value="Karyawan Swasta">Karyawan Swasta</option>
                  <option value="Wiraswasta">Wiraswasta / Usaha</option>
                  <option value="Honorer">Honorer / Kontrak</option>
                </select>
              </div>
              <div>
                <label class="label-text">Nama Instansi/Kantor</label>
                <input type="text" id="kantorPekerjaan" placeholder="PT / Toko / Kantor" class="input-field">
              </div>
              <div class="sm:col-span-2">
                <label class="label-text">Alamat Kantor</label>
                <input type="text" id="alamatKantor" placeholder="Alamat lengkap tempat bekerja" class="input-field">
              </div>
            </div>
            <div class="pt-4 border-t border-slate-50 space-y-4">
              <label class="label-text">Informasi Rekening Bank (Untuk Pencairan)</label>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2">
                <div>
                  <label class="text-[9px] font-bold text-slate-400 ml-1">Nama Bank</label>
                  <input type="text" id="namaBank" placeholder="BSI / Bank Kalsel / BCA" class="input-field">
                </div>
                <div>
                  <label class="text-[9px] font-bold text-slate-400 ml-1">No. Rekening</label>
                  <input type="text" inputmode="numeric" id="noRekBank" placeholder="717XXXXXXX" class="input-field">
                </div>
                <div class="sm:col-span-2">
                  <label class="text-[9px] font-bold text-slate-400 ml-1">Atas Nama Rekening</label>
                  <input type="text" id="anBank" placeholder="Nama sesuai buku tabungan" class="input-field">
                </div>
              </div>
            </div>

            <div class="pt-4 border-t border-slate-50">
              <label class="label-text">Keluarga Yang Bisa Dihubungi (Darurat)</label>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2">
                <input type="text" id="keluargaTidakSerumah" placeholder="Nama Lengkap" class="input-field">
                <input type="text" inputmode="numeric" maxlength="14" id="telponKeluargaTidakSerumah" placeholder="Nomor Whatsapp" class="input-field">
              </div>
            </div>
          </div>

          <!-- Step 4: Simpanan -->
          <div id="step-4" class="step-content hidden space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
              <div class="p-6 rounded-3xl bg-blue-50/50 border border-blue-100 space-y-4">
                <div class="flex items-center gap-2 mb-2">
                  <div
                    class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold">
                    1</div>
                  <h3 class="font-bold text-blue-900 text-sm">Simpanan Pokok</h3>
                </div>
                <div class="space-y-2">
                  <label
                    class="flex items-center gap-3 p-3 bg-white rounded-2xl cursor-pointer border border-transparent peer-checked:border-blue-500 transition-all shadow-sm">
                    <input type="radio" name="simpananPokok" value="300000" checked onchange="updateCheckout()">
                    <span class="text-sm font-bold text-slate-700">Rp 300.000 (Standar)</span>
                  </label>
                  <input type="number" id="pokokLain" placeholder="Atau nominal lain..."
                    class="input-field !bg-white border-blue-100" oninput="updateCheckout()">
                </div>
              </div>

              <div class="p-6 rounded-3xl bg-green-50/50 border border-green-100 space-y-4">
                <div class="flex items-center gap-2 mb-2">
                  <div
                    class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-white text-xs font-bold">
                    2</div>
                  <h3 class="font-bold text-green-900 text-sm">Simpanan Wajib</h3>
                </div>
                <div class="space-y-2">
                  <label
                    class="flex items-center gap-3 p-3 bg-white rounded-2xl cursor-pointer border border-transparent transition-all shadow-sm">
                    <input type="radio" name="simpananWajib" value="600000" checked onchange="updateCheckout()">
                    <span class="text-sm font-bold text-slate-700">Rp 600.000 / Tahun</span>
                  </label>
                  <input type="number" id="wajibLain" placeholder="Atau nominal lain..."
                    class="input-field !bg-white border-green-100" oninput="updateCheckout()">
                </div>
              </div>
            </div>

            <div class="space-y-3">
              <label class="label-text text-center">Metode Pembayaran Awal</label>
              <div class="grid grid-cols-2 gap-3">
                <label
                  class="flex items-center justify-center gap-2 p-3 rounded-2xl border cursor-pointer hover:bg-slate-50 transition-all font-bold text-xs">
                  <input type="radio" name="akunPembayaran" value="Cash" checked> Tunai
                </label>
                <label
                  class="flex items-center justify-center gap-2 p-3 rounded-2xl border cursor-pointer hover:bg-slate-50 transition-all font-bold text-xs">
                  <input type="radio" name="akunPembayaran" value="Transfer"> Transfer
                </label>
              </div>
            </div>
          </div>

          <!-- Footer Buttons -->
          <div class="pt-8 flex flex-col sm:flex-row justify-between gap-3">
            <button type="button" id="prevBtn"
              class="w-full sm:w-auto px-10 py-3 rounded-2xl font-bold text-slate-400 bg-slate-100 hidden hover:scale-95 transition-all">Kembali</button>
            <button type="button" id="nextBtn"
              class="w-full sm:w-auto sm:ml-auto px-12 py-4 rounded-2xl bg-green-500 text-white font-extrabold shadow-lg shadow-green-200 hover:bg-green-600 hover:-translate-y-1 transition-all">LANJUTKAN</button>
            <button type="submit" id="submitBtn"
              class="w-full sm:w-auto sm:ml-auto px-12 py-4 rounded-2xl bg-slate-800 text-white font-extrabold shadow-lg shadow-slate-200 hover:bg-black hover:-translate-y-1 transition-all hidden">AJUKAN
              PENDAFTARAN</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay"
    class="fixed inset-0 bg-white/95 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden p-6 text-center">
    <div class="w-14 h-14 border-4 border-slate-100 border-t-green-500 rounded-full animate-spin"></div>
    <p class="mt-6 font-bold text-slate-800 text-lg tracking-tight">Memproses Pendaftaran...</p>
    <p class="text-sm text-slate-400 mt-2">Mohon tunggu sebentar, kami sedang mengamankan data Anda.</p>
  </div>

  <?!= include('assets_js_JS_Helpers'); ?>
</body>

</html>
