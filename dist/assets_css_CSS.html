<style>
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f8fafc;
  }

  .glass-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
  }

  .step-dot {
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  .step-dot.active {
    background-color: #22c55e;
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
    transform: scale(1.1);
  }

  .step-dot.completed {
    background-color: #22c55e;
  }

  .step-dot.completed::after {
    content: '✓';
    color: white;
    font-size: 0.75rem;
  }

  .input-field {
    @apply w-full px-4 py-3 rounded-2xl border border-gray-100 bg-gray-50/50 focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition-all duration-300 text-sm;
  }

  .label-text {
    @apply text-[10px] font-bold text-gray-400 uppercase tracking-wider ml-1 mb-1 block;
  }

  @media (max-width: 640px) {
    .step-label { display: none; }
    .glass-card { border-radius: 0; }
  }

  @media (min-width: 1024px) {
    .summary-card { position: sticky; top: 2rem; }
  }

  .checkout-row {
    @apply flex justify-between py-2 border-b border-gray-50 last:border-0;
  }

  /* Toast Animation */
  #toast-container {
    perspective: 1000px;
  }
  .toast-entry {
    animation: slideIn 0.3s ease-out forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
