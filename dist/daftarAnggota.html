<script>  
  function setDefaultTanggal() {
    const tanggalInput = document.getElementById("tanggalBergabung");
    const today = new Date();
    const formattedDate = today.toISOString().split("T")[0];
    tanggalInput.value = formattedDate; 
  }
  window.onload = setDefaultTanggal;
</script>
<script>
  function limitDigits(input, maxLength) {
    if (input.value.length > maxLength) {
      input.value = input.value.slice(0, maxLength);
    }
  }
  function updateRadioValue(radioElement) {
    var inputId = radioElement.id; // pokokLainInput
    var valueId = inputId.substr(0,5); // pokok
    var radioBtn = document.getElementById(valueId + "Lain");
    if (radioBtn) {
      radioBtn.value = radioElement.value;
    }
  }
  
  function handleRadioChange(radioElement) {
    var inputId = radioElement.id;
    var condition = inputId.substr(-4);

    if (condition == "Lain"){
      var inputNumber = document.getElementById(inputId + "Input") ;
      inputNumber.disabled = false;
      radioElement.value = inputNumber.value;
    } else {
      var inputNumber = document.getElementById(inputId + "LainInput");
      inputNumber.disabled = true;
      // No need to reset value here as the radio button already has its static value from HTML
    }
  }
</script>
<script>
  document.getElementById('daftarAnggota').addEventListener('submit', function(event) {
      event.preventDefault(); // Prevent the default form submission

      var tanggalBergabung = document.getElementById('tanggalBergabung').value;
      var namaAnggota = document.getElementById('namaLengkap').value;      
      var nik = document.getElementById('nik').value;
      var tempatLahir = document.getElementById('tempatLahir').value;
      var tanggalLahir = document.getElementById('tanggalLahir').value;
      var jenisKelamin = document.querySelector('input[name="jenisKelamin"]:checked').value;
      var telponAnggota = document.getElementById('telpon').value;
      var email = document.getElementById('email').value;      
      var jalanKTP = document.getElementById('alamatKTP').value;
      var rtKTP = document.getElementById('rtKTP').value;
      var rwKTP = document.getElementById('rwKTP').value;
      var kelDesaKTP = document.getElementById('kelDesaKTP').value;
      var kecKTP = document.getElementById('kecKTP').value;
      var kodePosKTP = document.getElementById('kodePosKTP').value;
      var jalanTinggal = document.getElementById('alamatTinggal').value;
      var rtTinggal = document.getElementById('rtTinggal').value;
      var rwTinggal = document.getElementById('rwTinggal').value;
      var kelDesaTinggal = document.getElementById('kelDesaTinggal').value;
      var kecTinggal = document.getElementById('kecTinggal').value;
      var kodePosTinggal = document.getElementById('kodePosTinggal').value;
      var keluargaSerumah = document.getElementById('keluargaSerumah').value;
      var hubunganKeluargaSerumah = document.getElementById('hubunganKeluargaSerumah').value;
      var telponKeluargaSerumah = document.getElementById('telponKeluargaSerumah').value;
      var keluargaTidakSerumah = document.getElementById('keluargaTidakSerumah').value;      
      var telponKeluargaTidakSerumah = document.getElementById('telponKeluargaTidakSerumah').value;
      var jenisPekerjaan = document.getElementById('jenisPekerjaan').value;
      var kantorPekerjaan = document.getElementById('kantorPekerjaan').value;
      var jalanKantor = document.getElementById('alamatKantor').value;
      var rtKantor = document.getElementById('rtKantor').value;
      var rwKantor = document.getElementById('rwKantor').value;
      var kelDesaKantor = document.getElementById('kelDesaKantor').value;
      var kecKantor = document.getElementById('kecKantor').value;
      var kodePosKantor = document.getElementById('kodePosKantor').value;
      var namaBank = document.getElementById('namaBank').value;
      var noRekBank = document.getElementById('noRekBank').value;
      var anBank = document.getElementById('anBank').value;
      var simpananPokok = document.querySelector('input[name="simpananPokok"]:checked').value;
      var simpananWajib = document.querySelector('input[name="simpananWajib"]:checked').value;
      var akunPembayaran = document.getElementById('akunPembayaran').value;
            
      document.getElementById('loading').style.display = 'block'; // Show loading indicator        
      document.getElementById('submit').style.display = 'none';
      google.script.run
        .withSuccessHandler(function() {          
          document.getElementById('loading').style.display = 'none'; // Hide loading indicator
          google.script.host.close();
        })
        .withFailureHandler(function(err) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('submit').style.display = 'block';
          alert("Gagal mengirim data: " + (err.message || err));
        })
        .newTransaction({
        method: 'addMember',
        sheet: 'simpanan',
